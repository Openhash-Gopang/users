<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gopang Users</title>
<style>
body{margin:0;background:#fff;display:flex;align-items:center;justify-content:center;height:100vh;font-family:-apple-system,sans-serif;}
.loading{text-align:center;color:#6b7280;font-size:14px}
.dot{width:8px;height:8px;border-radius:50%;background:#0ea5e9;display:inline-block;margin:0 3px;animation:bounce .8s infinite alternate}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{to{transform:translateY(-8px);opacity:.4}}
</style>
</head>
<body>
<div class="loading">
  <div style="margin-bottom:12px"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
  Gopang Users 로딩 중…
</div>
<script>
(function(){
  const params = new URLSearchParams(location.search);
  const isMobile = /Mobi|Android|iPhone|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;
  const target = (params.get('gwp') === '1' || params.get('ctx') || isMobile) ? 'webapp.html' : 'desktop.html';
  location.replace(target + (location.search || ''));
})();
</script>
</body>
</html>
