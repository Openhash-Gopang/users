<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gopang Users</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0ea5e9">
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700;800&display=swap">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'IBM Plex Sans KR',-apple-system,sans-serif;font-size:15px;color:#0f172a;background:#f8fafc;-webkit-font-smoothing:antialiased;overflow:hidden}
button{font-family:'IBM Plex Sans KR',sans-serif;cursor:pointer;border:none}
:root{
  --sky:#0ea5e9;--sky-dk:#0284c7;--sky-bg:#f0f9ff;--sky-bd:#bae6fd;
  --teal:#0d9488;--teal-bg:#f0fdfa;
  --border:#e2e8f0;--txt2:#475569;--txt3:#94a3b8;
  --safe-b:env(safe-area-inset-bottom,0px);
}
.app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;background:#f8fafc}

/* ── 탑바 ── */
.topbar{background:#0f172a;padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.tb-mark{width:30px;height:30px;background:var(--sky);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;font-family:monospace}
.tb-info{flex:1}
.tb-name{font-size:15px;font-weight:800;color:#f1f5f9}
.tb-status{font-size:10px;color:#64748b;margin-top:1px}
.tb-close{padding:6px 11px;border-radius:7px;font-size:12px;font-weight:700;background:rgba(255,255,255,.1);color:#94a3b8;border:1px solid rgba(255,255,255,.1);transition:background .13s}
.tb-close:hover{background:rgba(255,255,255,.18);color:#f1f5f9}

/* ── 콘텐츠/스크린 ── */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column}
.screen{display:none;flex-direction:column;flex:1;animation:fadeIn .18s ease}
.screen.active{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* ── 채팅 화면 (메인) ── */
.chat-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.b-ai{max-width:88%;align-self:flex-start;background:#fff;border:1px solid var(--border);border-radius:4px 14px 14px 14px;padding:11px 13px;font-size:14px;line-height:1.75;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.b-user{max-width:88%;align-self:flex-end;background:var(--sky);color:#fff;border-radius:14px 14px 4px 14px;padding:11px 13px;font-size:14px;line-height:1.75}
.typing{display:flex;gap:4px;align-items:center;padding:11px 14px;background:#fff;border:1px solid var(--border);border-radius:4px 14px 14px 14px;align-self:flex-start;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.typing span{width:7px;height:7px;border-radius:50%;background:#94a3b8;animation:t .9s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes t{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-4px)}}
.quick-row{display:flex;gap:6px;flex-wrap:wrap;align-self:flex-start;padding:0 0 2px}
.qb{background:#fff;border:1.5px solid var(--border);border-radius:18px;padding:6px 12px;font-size:12px;font-weight:600;color:#334155;transition:all .13s}
.qb:active{background:var(--sky-bg);border-color:var(--sky);color:var(--sky-dk)}

/* ── 결과 카드 (인라인) ── */
.r-card{max-width:92%;align-self:flex-start;background:#fff;border:1px solid var(--border);border-radius:4px 14px 14px 14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.r-card-header{padding:9px 13px;background:#f8fafc;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--txt2)}
.r-item{padding:11px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .12s}
.r-item:last-child{border-bottom:none}
.r-item:active{background:#f0f9ff}
.r-av{width:34px;height:34px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:17px;background:var(--sky-bg)}
.r-av.person{background:#fef3c7}.r-av.concept{background:#faf5ff}
.r-info{flex:1;min-width:0}
.r-name{font-size:13px;font-weight:700;color:#0f172a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.r-sub{font-size:10px;color:var(--txt3);margin-top:1px}
.r-action{padding:6px 12px;border-radius:7px;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.r-action.connect{background:var(--sky)}
.r-action.transact{background:var(--teal)}
.r-badges{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap}
.badge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px}
.b-L3{background:#dcfce7;color:#166534}.b-L2{background:#dbeafe;color:#1e40af}
.b-L1{background:#fef9c3;color:#854d0e}.b-L0{background:#f1f5f9;color:#64748b}
.b-gdc{background:#fffbeb;color:#b45309}

/* ── 복수 후보 ── */
.multi-card{max-width:92%;align-self:flex-start;background:#fff;border:1.5px solid var(--sky-bd);border-radius:4px 14px 14px 14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.multi-header{padding:9px 13px;background:var(--sky-bg);font-size:11px;font-weight:700;color:var(--sky-dk)}
.multi-item{padding:10px 13px;border-top:1px solid var(--sky-bd);display:flex;align-items:center;gap:9px;cursor:pointer;transition:background .12s}
.multi-item:active{background:#f0f9ff}
.multi-num{width:22px;height:22px;border-radius:50%;background:var(--sky);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.multi-name{font-size:13px;font-weight:600;color:#0f172a}
.multi-hint{font-size:10px;color:var(--txt3)}
.multi-act{padding:4px 9px;border-radius:5px;font-size:10px;font-weight:700;background:var(--sky);color:#fff;flex-shrink:0;margin-left:auto}

/* ── 검색 화면 ── */
.search-screen{flex:1;display:flex;flex-direction:column}
.search-header{background:#fff;border-bottom:1px solid var(--border);padding:14px 16px}
.search-box{display:flex;align-items:center;background:#f1f5f9;border:1.5px solid var(--border);border-radius:10px;padding:0 12px;gap:8px;transition:border-color .15s}
.search-box:focus-within{border-color:var(--sky);background:#fff}
.si{flex:1;border:none;background:none;font-family:'IBM Plex Sans KR',sans-serif;font-size:14px;color:#0f172a;padding:11px 0;outline:none}
.si::placeholder{color:var(--txt3)}
.s-btn{padding:7px 13px;border-radius:7px;font-size:12px;font-weight:700;background:var(--sky);color:#fff;flex-shrink:0}
.filter-strip{display:flex;gap:6px;margin-top:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
.filter-strip::-webkit-scrollbar{display:none}
.fc{padding:5px 12px;border-radius:16px;font-size:11px;font-weight:600;border:1.5px solid var(--border);color:#475569;background:#fff;white-space:nowrap;flex-shrink:0}
.fc.active{border-color:var(--sky);background:var(--sky-bg);color:var(--sky-dk)}
.search-results{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 16px}
.sr-item{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px;cursor:pointer;transition:all .13s}
.sr-item:active{border-color:var(--sky)}
.sr-top{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.sr-av{width:36px;height:36px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;background:var(--sky-bg)}
.sr-name{font-size:14px;font-weight:700;color:#0f172a}
.sr-nick{font-size:10px;color:var(--sky-dk)}
.sr-desc{font-size:12px;color:var(--txt2);line-height:1.6;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sr-loc{font-size:11px;color:var(--txt3);margin-bottom:8px}
.sr-rating{font-size:11px;color:var(--txt2);margin-bottom:10px}
.sr-acts{display:flex;gap:6px}
.sr-act{flex:1;padding:8px;border-radius:7px;font-size:12px;font-weight:700;text-align:center}
.sr-act.connect{background:var(--sky);color:#fff}
.sr-act.transact{background:#fff;color:#0f172a;border:1.5px solid var(--border)}
.sr-empty{text-align:center;padding:48px 20px;color:var(--txt3)}
.sr-empty-icon{font-size:40px;margin-bottom:12px;opacity:.5}

/* ── 인풋 바 ── */
.input-bar{background:#fff;border-top:1px solid var(--border);padding:10px 12px;padding-bottom:calc(10px + var(--safe-b));display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
.chat-ta{flex:1;background:#f1f5f9;border:1.5px solid var(--border);border-radius:20px;padding:9px 14px;font-family:'IBM Plex Sans KR',sans-serif;font-size:14px;resize:none;outline:none;max-height:100px;line-height:1.5;transition:border-color .15s,background .15s}
.chat-ta:focus{border-color:var(--sky);background:#fff}
.snd-btn{width:38px;height:38px;border-radius:50%;background:var(--sky);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .14s}
.snd-btn:active{background:var(--sky-dk)}
.snd-btn:disabled{background:var(--sky-bd)}
.snd-btn svg{width:15px;height:15px;stroke:#fff;stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round}

/* ── 탭바 ── */
.tab-bar{background:#fff;border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-b);flex-shrink:0}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 4px;font-size:9px;font-weight:700;color:var(--txt3);background:none;border:none;transition:color .13s}
.tab-item.active{color:var(--sky-dk)}
.tab-icon{font-size:20px;line-height:1}

/* ── 설정 바텀시트 ── */
.sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:none}
.sheet-backdrop.show{display:block}
.bottom-sheet{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:#fff;border-radius:20px 20px 0 0;padding:0 0 calc(16px + var(--safe-b));z-index:201;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
.bottom-sheet.show{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:#e2e8f0;border-radius:2px;margin:12px auto 16px}
.sheet-title{font-size:16px;font-weight:800;color:#0f172a;padding:0 20px 12px;border-bottom:1px solid var(--border)}
.sheet-item{display:flex;align-items:center;padding:14px 20px;gap:12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.sheet-item:last-child{border-bottom:none}
.sheet-item:active{background:#f8fafc}
.sheet-item-icon{font-size:20px;flex-shrink:0}
.sheet-item-label{font-size:14px;font-weight:600;color:#0f172a;flex:1}
.sheet-item-sub{font-size:11px;color:var(--txt3)}
.sheet-item-val{font-size:12px;color:var(--sky-dk);font-weight:600}

/* ── 토스트 ── */
.toast{position:fixed;top:70px;left:16px;right:16px;max-width:448px;margin:0 auto;background:#0f172a;color:#f1f5f9;border-radius:10px;padding:11px 16px;font-size:13px;font-weight:500;z-index:9999;opacity:0;transform:translateY(-8px);transition:all .22s}
.toast.show{opacity:1;transform:translateY(0)}
</style>
</head>
<body>
<div class="app">

  <!-- 탑바 -->
  <div class="topbar">
    <div class="tb-mark">U</div>
    <div class="tb-info">
      <div class="tb-name">Gopang Users</div>
      <div class="tb-status" id="tb-status">연결 중…</div>
    </div>
    <button class="tb-close" onclick="tryClose()">✕ 닫기</button>
  </div>

  <!-- 콘텐츠 -->
  <div class="content" id="content-area">

    <!-- ① AI 채팅 화면 -->
    <div class="screen active" id="screen-chat">
      <div class="chat-body" id="chat-body">
        <div class="b-ai">안녕하세요! Gopang Users AI입니다. 🌐<br><br>
          사람, 기관, AI, 사물 — 누구든 자연어로 찾아드립니다.<br>
          거래할 업체나 연결할 인물을 말씀해 주세요.</div>
        <div class="quick-row">
          <button class="qb" onclick="qs('짜장면 주문해 줘')">🍜 짜장면 주문</button>
          <button class="qb" onclick="qs('제주도 홍길동 연결해 줘')">🧑 인물 연결</button>
          <button class="qb" onclick="qs('@해녀카페 연결')">@ 닉네임</button>
          <button class="qb" onclick="qs('우도 다이빙')">🤿 다이빙</button>
        </div>
      </div>
      <div class="input-bar">
        <textarea class="chat-ta" id="chat-input" rows="1"
          placeholder="자연어로 요청하세요…"
          oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
        <button class="snd-btn" id="snd-btn" onclick="sendMsg()">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="m22 2-7 20-4-9-9-4 20-7z"/></svg>
        </button>
      </div>
    </div>

    <!-- ② 검색 화면 -->
    <div class="screen" id="screen-search">
      <div class="search-header">
        <div class="search-box">
          <input class="si" id="search-input" placeholder="이름, @닉네임, IPv6, 업종…"
            onkeydown="if(event.key==='Enter') doSearch()">
          <button class="s-btn" onclick="doSearch()">검색</button>
        </div>
        <div class="filter-strip" id="filter-strip">
          <button class="fc active" data-t="" onclick="setFilter(this,'')">전체</button>
          <button class="fc" data-t="person" onclick="setFilter(this,'person')">🧑 자연인</button>
          <button class="fc" data-t="org" onclick="setFilter(this,'org')">🏢 기관</button>
          <button class="fc" data-t="concept" onclick="setFilter(this,'concept')">🤖 AI</button>
          <button class="fc" data-t="thing" onclick="setFilter(this,'thing')">📡 사물</button>
        </div>
      </div>
      <div class="search-results" id="search-results">
        <div class="sr-empty">
          <div class="sr-empty-icon">🔍</div>
          <div style="font-size:14px;font-weight:600;color:#475569;margin-bottom:4px">검색어를 입력하세요</div>
          <div style="font-size:12px">자연인·기관·AI·사물 모두 검색할 수 있습니다</div>
        </div>
      </div>
    </div>

    <!-- ③ 내 프로필 화면 -->
    <div class="screen" id="screen-profile">
      <div style="padding:20px 16px">
        <div style="background:#fff;border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:12px">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
            <div style="width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,var(--sky),var(--teal));display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff" id="prof-av">?</div>
            <div>
              <div style="font-size:16px;font-weight:800;color:#0f172a" id="prof-name">로그인 필요</div>
              <div style="font-size:11px;color:var(--txt3);margin-top:2px" id="prof-trust">–</div>
            </div>
          </div>
          <div style="background:#f8fafc;border-radius:8px;padding:10px 12px;font-size:11px;font-family:monospace;color:var(--txt3);word-break:break-all;line-height:1.5" id="prof-ipv6">–</div>
        </div>
        <button style="width:100%;padding:12px;border-radius:9px;background:var(--sky);color:#fff;font-size:14px;font-weight:700;border:none;cursor:pointer;margin-bottom:10px"
          onclick="showSettings()">⚙️ 설정</button>
        <button style="width:100%;padding:12px;border-radius:9px;background:#fff;color:#0f172a;font-size:14px;font-weight:600;border:1.5px solid var(--border);cursor:pointer"
          onclick="copyIPv6()">📋 IPv6 주소 복사</button>
      </div>
    </div>

  </div>

  <!-- 탭바 -->
  <div class="tab-bar" id="tab-bar">
    <button class="tab-item active" onclick="showScreen('chat',this)">
      <div class="tab-icon">💬</div>AI 검색
    </button>
    <button class="tab-item" onclick="showScreen('search',this)">
      <div class="tab-icon">🔍</div>직접 검색
    </button>
    <button class="tab-item" onclick="showScreen('profile',this)">
      <div class="tab-icon">👤</div>내 정보
    </button>
    <button class="tab-item" onclick="showSettings()">
      <div class="tab-icon">⚙️</div>설정
    </button>
  </div>
</div>

<!-- 설정 바텀시트 -->
<div class="sheet-backdrop" id="sheet-backdrop" onclick="hideSettings()"></div>
<div class="bottom-sheet" id="bottom-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">설정</div>
  <div class="sheet-item" onclick="toast('공개 프로필 편집은 gopang.net에서 가능합니다.')">
    <div class="sheet-item-icon">👤</div>
    <div>
      <div class="sheet-item-label">공개 프로필 편집</div>
      <div class="sheet-item-sub">이름, 소개, 서비스 태그</div>
    </div>
  </div>
  <div class="sheet-item" id="setting-public" onclick="togglePublic()">
    <div class="sheet-item-icon">🌐</div>
    <div>
      <div class="sheet-item-label">검색 공개 설정</div>
      <div class="sheet-item-sub">다른 사용자에게 검색 노출 허용</div>
    </div>
    <div class="sheet-item-val" id="setting-public-val">공개</div>
  </div>
  <div class="sheet-item" onclick="toast('GDC 결제 설정은 gdc.gopang.net에서 가능합니다.')">
    <div class="sheet-item-icon">₮</div>
    <div>
      <div class="sheet-item-label">GDC 결제 수락</div>
      <div class="sheet-item-sub">K-Market 거래 채널 활성화</div>
    </div>
    <div class="sheet-item-val" id="setting-gdc-val">사용</div>
  </div>
  <div class="sheet-item" onclick="hideSettings()">
    <div class="sheet-item-icon">✕</div>
    <div class="sheet-item-label">닫기</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ── 설정 ── */
const PROXY  = 'https://gopang-proxy.tensor-city.workers.dev';
const SP_URL = 'https://raw.githubusercontent.com/Openhash-Gopang/gopang_v2/main/prompts/SP-USERS-v1_0.txt';

let currentUser = null;
let systemPrompt = null;
let chatHistory  = [];
let currentFilter = '';
let isPublic = true;

/* ── 인증 ── */
window._onGopangAuth = function(user) {
  currentUser = user;
  document.getElementById('tb-status').textContent = `${user.name||'사용자'} · ${user.trust_level||'L0'}`;
  document.getElementById('prof-av').textContent = (user.name||'?').charAt(0).toUpperCase();
  document.getElementById('prof-name').textContent = user.name || user.ipv6?.slice(0,20) || '–';
  document.getElementById('prof-trust').textContent = `Trust ${user.trust_level||'L0'} · GAS v1.6`;
  document.getElementById('prof-ipv6').textContent = user.ipv6 || '–';
};

(function(){ const s=document.createElement('script');
  s.src='https://gopang.net/subsystem-auth.js';
  s.onerror=()=>{document.getElementById('tb-status').textContent='개발 모드';};
  document.head.appendChild(s); })();

/* ── GWP 부모 창 메시지 수신 ── */
window.addEventListener('message', e => {
  const d = e.data;
  if (!d || !d.type) return;
  if (d.type === 'GOPANG_SEARCH') {
    const q = d.query || '';
    document.getElementById('chat-input').value = q;
    sendMsg();
  }
});

/* ── SP 로드 ── */
async function loadSP() {
  if (systemPrompt) return systemPrompt;
  try {
    const r = await fetch(SP_URL + '?t=' + Date.now());
    systemPrompt = await r.text();
  } catch(e) {
    systemPrompt = '당신은 Gopang Users 검색 에이전트입니다. 사용자의 자연어 요청을 분석하여 엔티티를 검색합니다. 반드시 JSON으로만 응답하십시오.';
  }
  return systemPrompt;
}

/* ── 화면 전환 ── */
function showScreen(id, el) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id)?.classList.add('active');
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  document.getElementById('content-area').scrollTop = 0;
}

/* ── 닫기 ── */
function tryClose() {
  if (window.opener) { window.close(); }
  else { history.back(); }
}

/* ── 필터 ── */
function setFilter(el, type) {
  document.querySelectorAll('.fc').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentFilter = type;
  const q = document.getElementById('search-input').value.trim();
  if (q) doSearch();
}

/* ── AI 채팅 ── */
function qs(text) {
  showScreen('chat');
  document.querySelectorAll('.tab-item')[0].classList.add('active');
  document.getElementById('chat-input').value = text;
  sendMsg();
}

async function sendMsg() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; input.style.height = 'auto';

  appendMsg('user', text);
  document.getElementById('snd-btn').disabled = true;
  showTyping();

  try {
    const sp = await loadSP();
    chatHistory.push({role:'user', content: text});

    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system: sp + `\n\n[컨텍스트]\nrequester_ipv6: ${currentUser?.ipv6||'unknown'}\n모바일 환경: 짧고 명확하게 응답`,
        messages: chatHistory
      })
    });
    const data = await r.json();
    const reply = data.content?.[0]?.text || '{}';
    chatHistory.push({role:'assistant', content: reply});
    removeTyping();
    handleReply(reply, text);
  } catch(e) {
    removeTyping();
    /* 폴백: 더미 검색 */
    const dummy = getDummy(text);
    if (dummy.length) {
      appendMsg('ai', `"${text}" 검색 결과 ${dummy.length}건입니다.`);
      renderResults(dummy);
    } else {
      appendMsg('ai', '검색 결과가 없습니다. 다른 검색어를 시도해 보세요.');
    }
  }
  document.getElementById('snd-btn').disabled = false;
}

/* ── AI 응답 처리 ── */
function handleReply(raw, userText) {
  let parsed = null;
  try { parsed = JSON.parse(raw); } catch(e) {}

  if (!parsed) { appendMsg('ai', raw); return; }

  if (parsed.status === 'clarify') {
    appendMsg('ai', parsed.message);
    if (parsed.options?.length) {
      const row = document.createElement('div');
      row.className = 'quick-row';
      row.innerHTML = parsed.options.map(o=>`<button class="qb" onclick="qs('${o}')">${o}</button>`).join('');
      document.getElementById('chat-body').appendChild(row);
      scrollChat();
    }
    return;
  }

  if (parsed.status === 'multiple_found') {
    appendMsg('ai', parsed.message || '동명이인이 여럿 있습니다. 선택해 주세요.');
    renderMulti(parsed.candidates || []);
    return;
  }

  const results = parsed.results ? parsed.results :
    parsed.result ? [parsed.result] : [];

  if (results.length === 0) {
    appendMsg('ai', parsed.message || '검색 결과가 없습니다.');
    if (parsed.suggestions?.length) {
      const row = document.createElement('div');
      row.className = 'quick-row';
      row.innerHTML = parsed.suggestions.slice(0,3).map(s=>`<button class="qb" onclick="qs('${s}')">${s}</button>`).join('');
      document.getElementById('chat-body').appendChild(row);
      scrollChat();
    }
    return;
  }

  const label = parsed.intent === 'CONNECT' ? '연결할 엔티티를 찾았습니다.' :
    `"${parsed.query_summary||userText}" 검색 결과 ${results.length}건입니다.`;
  appendMsg('ai', label);
  renderResults(results);

  /* GWP 연결 액션이 있으면 바로 실행 */
  if (parsed.gwp_action?.type === 'OPEN_CHAT' && results.length === 1) {
    const r = results[0];
    setTimeout(() => {
      if (window.opener) {
        window.opener.postMessage({
          type:'GOPANG_CONNECT',
          target_ipv6: r.current_ipv6,
          target_guid: r.permanent_guid,
          target_name: r.display_name||r.name
        }, '*');
      }
    }, 1200);
  }
}

/* ── 결과 렌더링 ── */
function renderResults(results) {
  const body = document.getElementById('chat-body');
  const card = document.createElement('div');
  card.className = 'r-card';
  const isConnect = results[0]?.entity_type === 'person' || results[0]?.entity_type === 'concept';
  card.innerHTML = `<div class="r-card-header">검색 결과 ${results.length}건</div>` +
    results.slice(0,5).map(r => {
      const emoji = {person:'🧑',org:'🏢',concept:'🤖',thing:'📡'}[r.entity_type]||'🌐';
      const loc = [r.sigungu||r.location?.sigungu, r.dong||r.location?.dong].filter(Boolean).join(' ');
      const trustBadge = `<span class="badge b-${r.trust_level||'L0'}">${r.trust_level||'L0'}</span>`;
      const gdcBadge = r.gdc_accepted ? `<span class="badge b-gdc">₮ GDC</span>` : '';
      const actionLabel = r.entity_type==='org' ? '거래' : '연결';
      const actionClass = r.entity_type==='org' ? 'transact' : 'connect';
      return `
      <div class="r-item" onclick="doConnect('${r.permanent_guid}','${r.display_name||r.name}','${r.current_ipv6}','${r.entity_type}')">
        <div class="r-av ${r.entity_type}">${emoji}</div>
        <div class="r-info">
          <div class="r-name">${r.display_name||r.name||'이름 없음'}</div>
          <div class="r-badges">${trustBadge}${gdcBadge}</div>
          ${loc?`<div class="r-sub">📍 ${loc}${r.occupation?' · '+r.occupation:''}</div>`:''}
        </div>
        <div class="r-action ${actionClass}">${actionLabel}</div>
      </div>`;
    }).join('');
  body.appendChild(card);
  scrollChat();
}

function renderMulti(candidates) {
  const body = document.getElementById('chat-body');
  const card = document.createElement('div');
  card.className = 'multi-card';
  card.innerHTML = `<div class="multi-header">🔍 ${candidates.length}명 — 선택해 주세요</div>` +
    candidates.map((c,i)=>`
      <div class="multi-item" onclick="doConnect('${c.permanent_guid}','${c.name}','${c.current_ipv6}','${c.entity_type||'person'}')">
        <div class="multi-num">${i+1}</div>
        <div>
          <div class="multi-name">${c.name}</div>
          <div class="multi-hint">${c.hint||''}</div>
        </div>
        <div class="multi-act">연결</div>
      </div>`).join('');
  body.appendChild(card);
  scrollChat();
}

/* ── 연결 실행 ── */
function doConnect(guid, name, ipv6, type) {
  toast(`🔗 ${name} 연결 중…`);
  const msgType = type === 'org' ? 'GOPANG_TRANSACT' : 'GOPANG_CONNECT';
  if (window.opener) {
    window.opener.postMessage({type: msgType, target_ipv6: ipv6, target_guid: guid, target_name: name}, '*');
    setTimeout(() => window.close(), 700);
  } else {
    window.open(`https://[${ipv6}]/`, '_blank');
  }
}

/* ── 직접 검색 ── */
async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  document.getElementById('search-results').innerHTML =
    `<div class="sr-empty"><div class="sr-empty-icon">⏳</div><div style="font-size:13px;font-weight:600;color:#475569">검색 중…</div></div>`;
  try {
    const res = await fetch(`${PROXY}/market/search`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({query:q, filter:currentFilter, context:{requester_ipv6:currentUser?.ipv6}})
    });
    if (!res.ok) throw new Error();
    const data = await res.json();
    renderSearchResults(data.results||data, q);
  } catch(e) {
    renderSearchResults(getDummy(q), q);
  }
}

function renderSearchResults(results, q) {
  const el = document.getElementById('search-results');
  if (!results?.length) {
    el.innerHTML = `<div class="sr-empty"><div class="sr-empty-icon">🔭</div><div style="font-size:14px;font-weight:600;color:#475569">"${q}" 결과 없음</div></div>`;
    return;
  }
  el.innerHTML = results.map(r => {
    const emoji = {person:'🧑',org:'🏢',concept:'🤖',thing:'📡'}[r.entity_type]||'🌐';
    const loc = [r.sigungu||r.location?.sigungu, r.dong||r.location?.dong].filter(Boolean).join(' ');
    const stars = r.rating_avg > 0 ? '★'.repeat(Math.round(r.rating_avg))+'☆'.repeat(5-Math.round(r.rating_avg)) : '';
    const isConnect = r.entity_type==='person'||r.entity_type==='concept'||r.entity_type==='thing';
    return `
    <div class="sr-item">
      <div class="sr-top">
        <div class="sr-av">${emoji}</div>
        <div style="flex:1;min-width:0">
          <div class="sr-name">${r.display_name||r.name}</div>
          ${r.nickname?`<div class="sr-nick">@${r.nickname}</div>`:''}
        </div>
        <span class="badge b-${r.trust_level||'L0'}" style="font-size:9px">${r.trust_level||'L0'}</span>
      </div>
      ${r.bio?`<div class="sr-desc">${r.bio}</div>`:''}
      ${loc?`<div class="sr-loc">📍 ${loc}</div>`:''}
      ${stars?`<div class="sr-rating" style="color:#f59e0b">${stars} <span style="color:var(--txt2)">${r.rating_avg?.toFixed(1)} (${r.review_count})</span></div>`:''}
      <div class="sr-acts">
        <button class="sr-act connect" onclick="doConnect('${r.permanent_guid}','${r.display_name||r.name}','${r.current_ipv6}','${r.entity_type}')">
          ${isConnect?'연결':'채팅'}
        </button>
        ${!isConnect?`<button class="sr-act transact" onclick="doConnect('${r.permanent_guid}','${r.display_name||r.name}','${r.current_ipv6}','${r.entity_type}')">거래</button>`:''}
      </div>
    </div>`;
  }).join('');
}

/* ── 채팅 헬퍼 ── */
function appendMsg(role, text) {
  const body = document.getElementById('chat-body');
  const el = document.createElement('div');
  el.className = role==='user' ? 'b-user' : 'b-ai';
  el.innerHTML = text.replace(/\n/g,'<br>');
  body.appendChild(el);
  scrollChat();
}
function showTyping() {
  const body = document.getElementById('chat-body');
  const el = document.createElement('div');
  el.className='typing'; el.id='typing-ind';
  el.innerHTML='<span></span><span></span><span></span>';
  body.appendChild(el); scrollChat();
}
function removeTyping() { document.getElementById('typing-ind')?.remove(); }
function scrollChat() {
  const b = document.getElementById('chat-body');
  requestAnimationFrame(()=>{ b.scrollTop = b.scrollHeight; });
}

/* ── 설정 시트 ── */
function showSettings() {
  document.getElementById('sheet-backdrop').classList.add('show');
  document.getElementById('bottom-sheet').classList.add('show');
}
function hideSettings() {
  document.getElementById('sheet-backdrop').classList.remove('show');
  document.getElementById('bottom-sheet').classList.remove('show');
}
function togglePublic() {
  isPublic = !isPublic;
  document.getElementById('setting-public-val').textContent = isPublic ? '공개' : '비공개';
  localStorage.setItem('gopang_user_public', isPublic);
  toast(isPublic ? '🌐 검색 공개로 설정되었습니다.' : '🔒 검색 비공개로 설정되었습니다.');
}

/* ── IPv6 복사 ── */
function copyIPv6() {
  const ipv6 = currentUser?.ipv6 || document.getElementById('prof-ipv6').textContent;
  if (!ipv6 || ipv6==='–') { toast('IPv6 주소가 없습니다.'); return; }
  navigator.clipboard?.writeText(ipv6).then(()=>toast('📋 IPv6 주소 복사됨'));
}

/* ── 토스트 ── */
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2600);
}
