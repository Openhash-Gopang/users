  <style>
    :root {
      /* ══════════════════════════════════════════════════
         고팡 색상 시스템 v5.0
         Supabase 대시보드 스타일 기반
         간결·전문·사무적 / WCAG 2.1 AA 전항목 통과
         ══════════════════════════════════════════════════ */

      /* 기본 배경 */
      --bg:           #F8F9FA;   /* 아주 연한 회색 — Supabase 메인 bg */
      --bg-elevated:  #FFFFFF;   /* 카드·패널 */
      --bg-glass:     rgba(255,255,255,0.96);
      --bg-input:     #FFFFFF;
      --bg-subtle:    #F1F3F5;   /* 호버, 구분 */
      --bg-code:      #F4F4F5;

      /* 구분선 */
      --sep:          #E4E4E7;   /* 얇고 선명한 보더 */
      --sep-strong:   #D1D5DB;

      /* 텍스트 */
      --label:        #111827;   /* 거의 검정 */
      --label-2:      #374151;
      --label-3:      #6B7280;
      --label-4:      #9CA3AF;

      /* 헤더/사이드바 전용 텍스트 */
      --label-on-dark:   rgba(255,255,255,0.92);
      --label-2-on-dark: rgba(255,255,255,0.55);

      /* 브랜드 — Supabase 초록 계열 */
      --tint:         #3ECF8E;   /* Supabase 시그니처 그린 */
      --tint-dark:    #29A374;   /* 호버 */
      --tint-dim:     #ECFDF5;   /* 연초록 배경 */
      --tint-dim-bd:  #A7F3D0;

      /* 사이드바/헤더 — Supabase 짙은 네이비 */
      --header-bg:    #1A1F29;   /* Supabase 사이드바 */
      --header-mid:   #1A1F29;   /* 탑바 동일 */
      --header-top:   #FFFFFF;   /* 탑바를 흰색으로 — Supabase 스타일 */
      --header-hover: rgba(255,255,255,0.07);

      /* 내 메시지 버블 — 연한 초록 tint */
      --bubble-out-bg:   #ECFDF5;
      --bubble-out-text: #065F46;

      /* AI 메시지 버블 — 순백 카드 */
      --bubble-in-bg:    #FFFFFF;
      --bubble-in-text:  #111827;

      /* 시맨틱 */
      --green:        #059669;
      --red:          #DC2626;
      --yellow:       #D97706;
      --orange:       #EA580C;
      --blue:         #2563EB;

      /* 반경 — Supabase는 작은 반경 선호 */
      --r-sm:         4px;
      --r-md:         6px;
      --r-lg:         8px;
      --r-xl:         12px;

      --blur:         saturate(180%) blur(20px);
      --blur-sm:      saturate(160%) blur(10px);
      --font:         'Noto Sans KR', -apple-system, 'Helvetica Neue', sans-serif;
      --font-mono:    'IBM Plex Mono', 'SF Mono', monospace;
      --font-display: 'Noto Sans KR', -apple-system, sans-serif;
      --ease-spring:  cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-out:     cubic-bezier(0.16, 1, 0.3, 1);

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--label);

    .install-banner-text { flex: 1; }
    .install-banner-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--label);
      margin-bottom: 2px;
    }
    .install-banner-sub {
      font-size: 12px;
      color: var(--label-2);
      line-height: 1.4;

    .install-banner-actions {
      display: flex;

    .install-btn {

    .install-btn:active { opacity: 0.7; }
    .install-btn-primary { background: var(--tint); color: #fff; }
    .install-btn-dismiss {
      background: transparent;

      font-size: 12px;
      text-align: center;

    /* ── 우상단 버튼 그룹 ──────────────────────────────── */
    .top-btn {
      width: 34px; height: 34px;
      border-radius: var(--r-md);
      border: none;
      background: transparent;
      color: var(--label-3);

      display: flex; align-items: center; justify-content: center;

    .btn-ai {

      font-size: 12px;

    .btn-ai .ai-dot {

      border-radius: 50%;
      background: var(--label-4);

    }
    .btn-ai.active .ai-dot {
      background: var(--tint);

    }
    .btn-ai.active {
      background: var(--tint-dim);
      border-color: var(--tint-dim-bd);
      color: var(--green);

    }
    @keyframes pulse {
      0%,100% { opacity: 1; }

    /* ── 메시지 영역 ────────────────────────────────────── */

      background: var(--bg);

      overflow-y: auto;

    /* 위험 배지 (버블 아래 inline) */

    /* AI 타이핑 인디케이터 */
    .typing-indicator {
      display: flex; align-items: center; gap: 4px;
      padding: 12px 16px;
    }
    .typing-indicator span {
      width: 6px; height: 6px;
      border-radius: 50%;

    @keyframes bounce {

    .input-dock {

      background: var(--bg-elevated);
      border-top: 1px solid var(--sep);
    }

    /* 상태 바 — 숨김 처리 */
    .status-strip { display: none; }
    .status-dot   { display: none; }

    /* 입력 컨테이너 */
    .input-wrap {
      display: flex;

    /* 좌측 액션 버튼 */

      padding-bottom: 2px;

    .ia-btn {

      border-radius: 6px;
      border: none;
      background: transparent;
      color: #718096;
      cursor: pointer;

    .ia-btn:hover  { color: var(--tint); background: var(--tint-dim); }
    /* 흰 배경 입력창 안 아이콘 — 더 진하게 */

    /* 버전 선택 드롭다운 */
    .version-select { display: none; }

    .version-select option { background: #17212B; color: #fff; }

    #msg-input {

    /* 전송 버튼 */
    .send-btn {

      color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 15px;
      transition: background 0.15s, transform 0.1s var(--ease-spring), opacity 0.15s;

<script>
// ════════════════════════════════════════════════════════════
// users.gopang.net — webapp.html v2.1 (모바일)
// 변경: 실제 DB(user_profiles 기반) + ctx 수신

const PROXY      = 'https://gopang-proxy.tensor-city.workers.dev';
const SP_URL     = 'https://raw.githubusercontent.com/Openhash-Gopang/users/main/SP-USERS-v2_0.txt';
const SB_URL     = 'https://ebbecjfrwaswbdybbgiu.supabase.co';
const SB_KEY     = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViYmVjamZyd2Fzd2JkeWJiZ2l1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NjE5ODQsImV4cCI6MjA5NTEzNzk4NH0.H2ahQKtWdSke04Pdi3hDY86pdTx7UUKPUpQMlS_zciA';
const SB_HEADERS = { 'Content-Type':'application/json', 'apikey':SB_KEY, 'Authorization':'Bearer '+SB_KEY };

let currentUser   = null;
let systemPrompt  = null;
let chatHistory   = [];
let currentFilter = '';
let isPublic      = true;
let userLocation  = null;
let callerCtx     = null;
let micActive     = false;
let recognition   = null;

/* ── 인증 콜백 ── */
window._onGopangAuth = function(user) {
  currentUser = user;
  document.getElementById('tb-trust').textContent = `Trust ${user.trust_level||'L0'}`;
  const init = (user.name||'?').charAt(0).toUpperCase();
  document.getElementById('prof-av').textContent    = init;
  document.getElementById('prof-name').textContent  = user.name || (user.ipv6||user.guid||'').slice(0,20) || '–';
  document.getElementById('prof-trust').textContent = `Trust ${user.trust_level||'L0'} · GAS v1.6`;
  document.getElementById('prof-ipv6').textContent  = user.ipv6 || user.guid || '–';
};

/* ── GWP 메시지 수신 (SUBSYSTEM이 postMessage로 쿼리 전달) ── */
window.addEventListener('message', e => {
  if (e.origin !== 'https://gopang.net') return;
  if (e.data?.type === 'GOPANG_SEARCH') {
    document.getElementById('chat-input').value = e.data.query || '';
    showScreen('chat');
    sendMsg();
  }
});

/* ── GWP ctx URL 파라미터 처리 ── */
(function initCtx() {
  const params = new URLSearchParams(location.search);
  const ctxRaw = params.get('ctx');
  const ctxEnc = params.get('ctx_enc');
  if (!ctxRaw) return;
  try {
    const decoded = ctxEnc === 'b64'
      ? decodeURIComponent(escape(atob(ctxRaw)))
      : decodeURIComponent(ctxRaw);
    callerCtx = JSON.parse(decoded);
    if (callerCtx.query) {
      setTimeout(() => {
        document.getElementById('chat-input').value = callerCtx.query;
        showScreen('chat');
        document.querySelectorAll('.tab-item')[0]?.classList.add('active');
        sendMsg();
      }, 300);
    }
  } catch(e) { console.warn('[ctx] 파싱 실패:', e); }
})();

/* ── GPS ── */
(function initLocation() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(
    pos => { userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude }; },
    () => {}
  );
})();

/* ── SP 로드 ── */
async function loadSP() {
  if (systemPrompt) return systemPrompt;
  try {
    const r = await fetch(SP_URL + '?t=' + Date.now());
    if (r.ok) { systemPrompt = await r.text(); return systemPrompt; }
  } catch {}
  systemPrompt = `당신은 Gopang Users 엔티티 검색·해석 에이전트다.
모든 응답은 반드시 JSON으로만 반환한다.
[ok/TRANSACT] {"status":"ok","caller_echo":"...","intent":"TRANSACT","results":[...],"gwp_action":{"type":"DISPLAY_RESULTS"}}
[ok/CONNECT]  {"status":"ok","caller_echo":"...","intent":"CONNECT","result":{...},"gwp_action":{"type":"OPEN_CHAT","target_guid":"..."}}
[multiple]    {"status":"multiple_found","message":"...","candidates":[...]}
[no_result]   {"status":"no_result","message":"검색 결과가 없습니다."}
[clarify]     {"status":"clarify","message":"...","options":[...]}
is_public=FALSE 엔티티 절대 노출 금지.`;
  return systemPrompt;
}

/* ── 화면 전환 ── */
function showScreen(id, el) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id)?.classList.add('active');
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
}

function tryClose() {
  if (window.opener) window.close(); else history.back();
}

/* ── 필터 ── */
function setFilter(el, type) {
  document.querySelectorAll('.fc').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentFilter = type;
  const q = document.getElementById('search-input').value.trim();
  if (q) doSearch();
}

/* ── AI 채팅 ── */
function qs(text) {
  showScreen('chat');
  document.querySelectorAll('.tab-item')[0]?.classList.add('active');
  document.getElementById('chat-input').value = text;
  sendMsg();
}

async function sendMsg() {
  const input = document.getElementById('chat-input');
  const text  = input.value.trim();
  if (!text) return;
  input.value = ''; input.style.height = 'auto';
  appendMsg('user', text);
  document.getElementById('snd-btn').disabled = true;
  showTyping();
  try {
    const sp = await loadSP();
    chatHistory.push({ role: 'user', content: text });
    const contextNote = [
      `caller: users-webapp`,
      `requester_guid: ${currentUser?.ipv6 || currentUser?.guid || 'unknown'}`,
      userLocation ? `location: lat=${userLocation.lat}, lng=${userLocation.lng}` : '',
      callerCtx?.caller ? `original_caller: ${callerCtx.caller}` : '',
    ].filter(Boolean).join('\n');

    const r = await fetch(`${PROXY}/ai/chat`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system:     sp + '\n\n[컨텍스트]\n' + contextNote,
        messages:   chatHistory,
        max_tokens: 1500,
      }),
    });
    const data  = await r.json();
    const reply = data.content || data.reply || '{}';
    chatHistory.push({ role: 'assistant', content: reply });
    removeTyping();
    handleReply(reply, text);
  } catch {
    removeTyping();
    const fallback = getDummy(text);
    if (fallback.length) {
      appendMsg('ai', `"${text}" 검색 결과 ${fallback.length}건입니다. (로컬 데이터)`);
      renderResultBub(fallback);
    } else {
      appendMsg('ai', '검색 결과가 없습니다. 다른 검색어를 시도해 보세요.');
    }
  }
  document.getElementById('snd-btn').disabled = false;
}

function handleReply(raw, userText) {
  let parsed = null;
  try { parsed = JSON.parse(raw); } catch {}
  if (!parsed) { appendMsg('ai', raw); return; }
  if (parsed.status === 'clarify') {
    appendMsg('ai', parsed.message);
    if (parsed.options?.length) {
      const row = document.createElement('div');
      row.className = 'quick-chips';
      row.innerHTML = parsed.options.map(o => `<button class="qchip" onclick="qs('${o}')">${o}</button>`).join('');
      document.getElementById('chat-body').appendChild(row);
    }
    scrollChat(); return;
  }
  if (parsed.status === 'multiple_found') {
    appendMsg('ai', parsed.message || '동명이인이 여럿 있습니다.');
    renderMultiBub(parsed.candidates || []); return;
  }
  const results = parsed.results ? parsed.results : parsed.result ? [parsed.result] : [];
  if (!results.length) { appendMsg('ai', parsed.message || '검색 결과가 없습니다.'); return; }
  appendMsg('ai', `"${parsed.query_summary||userText}" 검색 결과 ${results.length}건입니다.`);
  renderResultBub(results);
}

function renderResultBub(results) {
  const body = document.getElementById('chat-body');
  const card = document.createElement('div'); card.className = 'r-bubble';
  card.innerHTML = `<div class="r-bub-hd">검색 결과 ${results.length}건</div>` +
    results.slice(0, 5).map(r => `
      <div class="r-bub-row" onclick="doConnect('${r.guid}','${r.name||r.display_name}','${r.entity_type}')">
        <div class="r-av">${typeIcon[r.entity_type]||typeIcon.org}</div>
        <div style="flex:1;min-width:0">
          <div class="r-name">${r.name||r.display_name||'–'}</div>
          <div class="r-badge">
            <span class="badge b-${r.trust_level||'L0'}">${r.trust_level||'L0'}</span>
            ${r.gdc_accepted ? '<span class="badge b-gdc">₮ GDC</span>' : ''}
          </div>
          <div class="r-sub">${[r.address, r.occupation].filter(Boolean).join(' · ')||'–'}</div>
        </div>
        <div class="r-act">${r.entity_type==='org'?'거래':'연결'}</div>

function renderMultiBub(candidates) {
  const body = document.getElementById('chat-body');
  const card = document.createElement('div'); card.className = 'multi-bub';
  card.innerHTML = `<div class="multi-bub-hd">동명이인 ${candidates.length}명 — 선택해 주세요</div>` +
    candidates.map((c, i) => `
      <div class="multi-bub-row" onclick="doConnect('${c.guid}','${c.name}','person')">
        <div class="m-idx">${i+1}</div>
        <div><div class="m-name">${c.name}</div><div class="m-hint">${c.hint||''}</div></div>
        <div class="m-act">연결</div>
      </div>`).join('');
  body.appendChild(card); scrollChat();
}

/* ── 직접 검색 (Supabase search_entities RPC 직접 호출) ── */
async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  document.getElementById('search-results').innerHTML =
    `<div class="sr-loading"><div class="spinner"></div>검색 중…</div>`;

  const entityType  = callerCtx?.filter?.entity_type || currentFilter || null;
  const occupation  = callerCtx?.filter?.occupation  || null;
  const loc         = callerCtx?.location || userLocation || null;
  const sort        = callerCtx?.sort     || 'rating';
  const excludeGuid = currentUser?.guid   || currentUser?.ipv6 || null;

  try {
    const res = await fetch(`${SB_URL}/rest/v1/rpc/search_entities`, {
      method:  'POST',
      headers: SB_HEADERS,
      body: JSON.stringify({
        p_entity_type:  entityType,
        p_keyword:      q || null,
        p_occupation:   occupation,
        p_address:      callerCtx?.filter?.address  || null,
        p_gdc_only:     callerCtx?.filter?.gdc_only || false,
        p_trust_min:    callerCtx?.filter?.trust_min|| null,
        p_lat:          loc?.lat  || null,
        p_lng:          loc?.lng  || null,
        p_sort:         sort,
        p_limit:        10,
        p_offset:       0,
        p_exclude_guid: excludeGuid,
      }),
    });
    if (!res.ok) throw new Error(`Supabase ${res.status}`);
    const rows = await res.json();
    renderSearchList(Array.isArray(rows) ? rows : [], q);
  } catch { renderSearchList(getDummy(q), q); }
}

function renderSearchList(results, q) {
  const el = document.getElementById('search-results');
  if (!results?.length) {
    el.innerHTML = `<div class="sr-empty"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><div class="sr-empty-title">"${q}" 결과 없음</div></div>`;
    return;
  }
  el.innerHTML = results.map(r => {
    const isConnect = r.entity_type !== 'org';
    const stars = r.rating_avg > 0 ? '★'.repeat(Math.round(r.rating_avg)) + ` ${Number(r.rating_avg).toFixed(1)}` : '';
    return `
    <div class="sr-item">
      <div class="sr-top">
        <div class="sr-av">${typeIcon[r.entity_type]||typeIcon.org}</div>
        <div style="flex:1;min-width:0">
          <div class="sr-name">${r.name||'–'}</div>
          ${r.nickname ? `<div class="sr-nick">@${r.nickname}</div>` : ''}
          <div class="sr-badges">
            <span class="badge b-${r.trust_level||'L0'}">${r.trust_level||'L0'}</span>
            ${r.gdc_accepted ? '<span class="badge b-gdc">₮ GDC</span>' : ''}
          </div>
        </div>
      </div>
      ${r.address ? `<div class="sr-loc"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${r.address}</div>` : ''}
      ${stars ? `<div style="font-size:11px;color:#d97706;margin-bottom:8px">${stars}</div>` : ''}
      <div class="sr-acts">
        <button class="sr-act connect" onclick="doConnect('${r.guid}','${r.name}','${r.entity_type}')">
          ${isConnect ? '연결' : '채팅'}
        </button>
        ${!isConnect ? `<button class="sr-act outline" onclick="doConnect('${r.guid}','${r.name}','transact')">거래</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

/* ── 연결 / 거래 선택 → caller에게 postMessage ── */
function doConnect(guid, name, type) {
  toast(`${name} 연결 중…`);
  const msgType = type === 'transact' ? 'GOPANG_TRANSACT' : 'GOPANG_CONNECT';
  const payload = {
    type:        msgType,
    target_guid: guid,
    target_name: name,
    caller_echo: callerCtx?.caller || 'users-webapp',
  };
  if (window.opener) {
    window.opener.postMessage(payload, 'https://gopang.net');
    setTimeout(() => window.close(), 700);
  } else {
    window.open(`https://gopang.net/?connect=${encodeURIComponent(guid)}`, '_blank');
  }
}

/* ── 마이크 (webapp_manual v3.6 패턴) ── */
function toggleMic() {
  if (micActive) {
    recognition?.stop();
    micActive = false;
    _micSetUI(false);
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  // iOS 폴백: MediaRecorder 방식은 별도 서버 STT 필요 → 안내만
  if (!SR) { toast('이 브라우저는 음성 인식을 지원하지 않습니다.'); return; }
  // ★ getUserMedia() 선행 호출 없음 (webapp_manual §3.4)
  recognition = new SR();
  recognition.lang           = 'ko-KR';
  recognition.continuous     = false;
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onresult = (e) => {
    const t     = e.results[0][0].transcript;
    const input = document.getElementById('chat-input');
    if (input && t) {
      input.value = t;
      // ★ autoResize + updateSendBtn 직접 호출 (dispatchEvent 절대 사용 금지)
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
      const btn = document.getElementById('snd-btn');
      if (btn) btn.disabled = !t.trim();
    }
    micActive = false;
    _micSetUI(false);
    // 자동 전송
    if (t.trim()) setTimeout(() => sendMsg(), 300);
  };
  recognition.onerror = () => { micActive = false; _micSetUI(false); };
  recognition.onend   = () => { micActive = false; _micSetUI(false); };

  recognition.start();
  micActive = true;
  _micSetUI(true);
}

function _micSetUI(active) {
  const btn = document.getElementById('mic-btn');
  if (!btn) return;
  btn.style.color = active ? 'var(--green)' : '';
}

/* ── 채팅 헬퍼 ── */
function appendMsg(role, text) {
  const body = document.getElementById('chat-body');
  const el   = document.createElement('div');
  el.className = role === 'user' ? 'b-user' : 'b-ai';
  el.innerHTML = text.replace(/\n/g, '<br>');
  body.appendChild(el); scrollChat();
}
function showTyping() {
  const body = document.getElementById('chat-body');
  const el   = document.createElement('div');
  el.className = 'typing-bub'; el.id = 'typing-ind';
  el.innerHTML = '<span></span><span></span><span></span>';
  body.appendChild(el); scrollChat();
}
function removeTyping() { document.getElementById('typing-ind')?.remove(); }
function scrollChat() {
  const b = document.getElementById('chat-body');
  requestAnimationFrame(() => { b.scrollTop = b.scrollHeight; });
}

/* ── 시트 ── */
function showSheet() {
  document.getElementById('sheet-bd').classList.add('show');
  document.getElementById('bottom-sheet').classList.add('show');
}
function hideSheet() {
  document.getElementById('sheet-bd').classList.remove('show');
  document.getElementById('bottom-sheet').classList.remove('show');
}

/* ── is_public 토글 (Supabase user_profiles 직접 PATCH) ── */
async function togglePublic() {
  isPublic = !isPublic;
  document.getElementById('pub-val').textContent = isPublic ? '공개' : '비공개';
  localStorage.setItem('gopang_user_public', isPublic);

  const guid = currentUser?.guid || currentUser?.ipv6;
  if (guid) {
    try {
      await fetch(
        `${SB_URL}/rest/v1/user_profiles?guid=eq.${encodeURIComponent(guid)}`,
        {
          method:  'PATCH',
          headers: { ...SB_HEADERS, 'Prefer': 'return=minimal' },
          body:    JSON.stringify({ is_public: isPublic }),
        }
      );
    } catch(e) { console.warn('[togglePublic] Supabase 동기화 실패:', e.message); }
  }
  toast(isPublic ? '검색 공개로 설정되었습니다.' : '검색 비공개로 설정되었습니다.');
}

/* ── 유틸 ── */
function copyIPv6() {
  const guid = currentUser?.ipv6 || currentUser?.guid;
  if (!guid) { toast('주소 정보가 없습니다.'); return; }
  navigator.clipboard?.writeText(guid).then(() => toast('주소 복사됨'));
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function getDummy(q) {
  const l = (q||'').toLowerCase();
  if (!l) return DUMMY_DB_W.slice(0, 5);
  const r = DUMMY_DB_W.filter(r =>
    r.name.toLowerCase().includes(l) ||
    (r.services||[]).some(s => s.toLowerCase().includes(l)) ||
    (r.occupation||'').toLowerCase().includes(l) ||
    (r.address||'').toLowerCase().includes(l)
  );
  return r.length ? r : DUMMY_DB_W.slice(0, 3);
}
